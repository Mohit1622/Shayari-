<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shayari Hub | shyari-world</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #334155; --primary: #6366f1; --font-size: 1.2rem; }
        .dark-mode { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --primary: #818cf8; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.3s; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }

        /* Font Styles */
        .font-elegant { font-family: 'Georgia', serif !important; }
        .font-stylish { font-family: 'cursive', sans-serif !important; }
        .text-center { text-align: center; }
        .text-left { text-align: left; }

        header { text-align: center; padding: 40px 15px; background: var(--card); border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .brand-name { font-size: 2.2rem; font-weight: 800; color: var(--primary); }
        .username-tag { font-size: 0.85rem; background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; font-weight: bold; }

        /* Categories Section */
        .category-container { display: flex; justify-content: center; gap: 10px; margin: 25px 0; overflow-x: auto; padding: 5px; }
        .cat-box { padding: 12px 20px; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; font-size: 0.9rem; flex-shrink: 0; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .cat-love { background: linear-gradient(45deg, #ff4e50, #f9d423); }
        .cat-sad { background: linear-gradient(45deg, #2193b0, #6dd5ed); }
        .cat-romantic { background: linear-gradient(45deg, #ee0979, #ff6a00); }
        .cat-all { background: #64748b; }

        #searchInput { width: 90%; max-width: 450px; padding: 12px 20px; border-radius: 30px; border: 1px solid #ddd; outline: none; margin-top: 15px; background: var(--card); color: var(--text); font-size: 1rem; }

        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        .card { background: var(--card); padding: 30px; border-radius: 25px; margin-bottom: 20px; border-left: 8px solid var(--primary); box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .content { font-size: var(--font-size); line-height: 1.6; margin-bottom: 20px; font-weight: 500; }

        /* Buttons */
        .card-footer { display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 15px; }
        .btn { padding: 8px 16px; border-radius: 12px; font-size: 0.85rem; border: none; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 6px; }
        .img-btn { background: var(--primary); color: white; }
        .copy-btn { background: #f1f5f9; color: #475569; }
        .wa-btn { background: #25d366; color: white; text-decoration: none; }

        /* Full Dashboard Sidebar */
        .sidebar { position: fixed; right: -320px; top: 0; width: 300px; height: 100%; background: var(--card); z-index: 2000; padding: 30px; box-shadow: -10px 0 30px rgba(0,0,0,0.1); overflow-y: auto; }
        .sidebar.active { right: 0; }
        .sidebar-toggle { position: fixed; right: 20px; top: 20px; z-index: 2100; background: var(--primary); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        .side-section { margin-bottom: 25px; }
        .side-section label { display: block; font-size: 0.8rem; font-weight: bold; color: var(--primary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .opt-btn { padding: 10px; border: 1px solid #ddd; background: none; border-radius: 10px; color: var(--text); cursor: pointer; font-size: 0.8rem; }
        .opt-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        footer { text-align: center; padding: 50px 20px; background: var(--card); margin-top: 40px; border-top: 1px solid #eee; }
        .social-icons { display: flex; justify-content: center; gap: 25px; font-size: 1.8rem; margin-bottom: 20px; }
        .social-icons a { color: var(--primary); }
        .copyright { font-size: 1rem; font-weight: bold; color: var(--text); }
        .made-with { font-size: 0.85rem; color: #64748b; margin-top: 5px; }
    </style>
</head>
<body id="mainBody">

<button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-magic"></i></button>

<div class="sidebar" id="sidebar">
    <h2 style="margin-bottom:25px;">Customize Hub 🛠️</h2>
    
    <div class="side-section">
        <label>Theme Mode</label>
        <div class="option-grid">
            <button class="opt-btn" onclick="setTheme('light')">Light</button>
            <button class="opt-btn" onclick="setTheme('dark')">Dark</button>
        </div>
    </div>

    <div class="side-section">
        <label>Font Style</label>
        <div class="option-grid">
            <button class="opt-btn" onclick="setFont('default')">Modern</button>
            <button class="opt-btn" onclick="setFont('font-elegant')">Elegant</button>
            <button class="opt-btn" onclick="setFont('font-stylish')">Stylish</button>
        </div>
    </div>

    <div class="side-section">
        <label>Text Alignment</label>
        <div class="option-grid">
            <button class="opt-btn" onclick="setAlign('center')">Center</button>
            <button class="opt-btn" onclick="setAlign('left')">Left</button>
        </div>
    </div>

    <div class="side-section">
        <label>Font Size</label>
        <input type="range" min="1" max="2" step="0.1" value="1.2" style="width:100%" oninput="setSize(this.value)">
    </div>

    <button onclick="toggleSidebar()" class="btn" style="width:100%; background:#ff4444; color:white; justify-content:center; padding:12px;">Apply & Close</button>
</div>

<header>
    <div class="brand-name">The Shayari Hub</div>
    <span class="username-tag">@shyari-world</span>
    
    <div class="category-container">
        <div class="cat-box cat-all" onclick="filterCat('')">All</div>
        <div class="cat-box cat-love" onclick="filterCat('love')">Love ❤️</div>
        <div class="cat-box cat-sad" onclick="filterCat('sad')">Sad 💔</div>
        <div class="cat-box cat-romantic" onclick="filterCat('romantic')">Romantic 🌹</div>
    </div>

    <input type="text" id="searchInput" onkeyup="search()" placeholder="Search shayari (e.g. Love, Bewafa)...">
</header>

<div class="container" id="feed"></div>

<footer>
    <div class="social-icons">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-whatsapp"></i></a>
    </div>
    <p class="copyright">© 2026 The Shayari Hub</p>
    <p class="made-with">Made with ❤️ Mohit</p>
</footer>

<script src="data.js"></script>

<script>
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    
    function setTheme(m) {
        document.body.classList.remove('dark-mode');
        if(m === 'dark') document.body.classList.add('dark-mode');
        localStorage.setItem('hubTheme', m);
    }

    function setFont(s) {
        const b = document.getElementById('mainBody');
        b.classList.remove('font-elegant', 'font-stylish');
        if(s !== 'default') b.classList.add(s);
        localStorage.setItem('hubFont', s);
    }

    function setAlign(a) {
        const cards = document.querySelectorAll('.card');
        cards.forEach(c => {
            c.classList.remove('text-center', 'text-left');
            c.classList.add('text-' + a);
        });
        localStorage.setItem('hubAlign', a);
    }

    function setSize(v) {
        document.documentElement.style.setProperty('--font-size', v + 'rem');
        localStorage.setItem('hubSize', v);
    }

    function render(data) {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        if(!data || data.length === 0) {
            feed.innerHTML = '<div class="card text-center"><p>Dost, is category mein abhi shayari nahi mili. <br>Kuch aur search karein! ✨</p></div>';
            return;
        }
        data.forEach((text, index) => {
            const div = document.createElement('div');
            const align = localStorage.getItem('hubAlign') || 'left';
            div.className = `card text-${align}`;
            div.id = `card-${index}`;
            div.innerHTML = `
                <div class="content">${text}</div>
                <div class="card-footer">
                    <button class="btn img-btn" onclick="downloadImg('card-${index}')"><i class="fas fa-camera"></i> Photo</button>
                    <button class="btn copy-btn" onclick="copyText('${text.replace(/'/g, "\\'")}')">Copy</button>
                    <a href="https://api.whatsapp.com/send?text=${encodeURIComponent(text)}" target="_blank" class="btn wa-btn"><i class="fab fa-whatsapp"></i></a>
                </div>`;
            feed.appendChild(div);
        });
    }

    function downloadImg(cardId) {
        const card = document.getElementById(cardId);
        const footer = card.querySelector('.card-footer');
        footer.style.display = 'none';
        html2canvas(card, { backgroundColor: null, scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'ShayariHub_' + cardId + '.png';
            link.href = canvas.toDataURL();
            link.click();
            footer.style.display = 'flex';
        });
    }

    function copyText(t) {
        navigator.clipboard.writeText(t);
        alert("Shayari Copy Ho Gayi! ✅");
    }

    function filterCat(cat) {
        document.getElementById('searchInput').value = cat;
        search();
    }

    function search() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        if(typeof allShayari !== 'undefined') {
            const filtered = allShayari.filter(s => s.toLowerCase().includes(q));
            render(filtered);
        }
    }

    window.onload = () => {
        // Load settings
        setTheme(localStorage.getItem('hubTheme') || 'light');
        setFont(localStorage.getItem('hubFont') || 'default');
        setSize(localStorage.getItem('hubSize') || '1.2');
        
        if(typeof allShayari !== 'undefined') {
            render(allShayari);
        } else {
            document.getElementById('feed').innerHTML = '<div class="card text-center" style="color:red">data.js file nahi mil rahi!</div>';
        }
    };
    <script src="data.js"></script>
<script src="script.js"></script> 
</body>
</html>
