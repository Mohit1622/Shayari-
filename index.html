<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohit Shayari World ✨</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #334155; --primary: #6366f1; }
        .dark-mode { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --primary: #818cf8; }
        /* Auto Themes */
        .holi-theme { --bg: #fff1f2; --card: #ffffff; --primary: #e11d48; background-image: radial-gradient(#fda4af 1px, transparent 1px); background-size: 20px 20px; }
        .diwali-theme { --bg: #1a1a1a; --card: #2d2d2d; --primary: #fbbf24; --text: #fff; }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.4s; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; margin-bottom: 15px; border-left: 6px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        header { text-align: center; padding: 40px 20px; background: var(--card); border-radius: 0 0 30px 30px; }
    </style>
</head>
<body>

<header>
    <h1 id="mainTitle">Mohit Shayari World ✨</h1>
    <input type="text" id="searchInput" onkeyup="search()" style="width:90%; padding:12px; margin-top:20px; border-radius:25px; border:1px solid #ddd;" placeholder="Shayari dhundein...">
</header>

<div class="container" id="feed"></div>

<footer style="text-align:center; padding:40px; background:var(--card); margin-top:20px; border-radius:30px 30px 0 0;">
    <div id="socialLinks" style="font-size:1.5rem; margin-bottom:15px; display:flex; justify-content:center; gap:20px;"></div>
    <p>© 2026 Mohit Kumar</p>
    <p id="ownerEmail" style="font-size:0.8rem; color:var(--primary); margin-top:5px;"></p>
</footer>

<script src="config.js"></script>
<script src="data.js"></script>

<script>
    // AUTO EVENT DETECTOR
    function checkEvents() {
        const today = new Date();
        const month = today.getMonth() + 1; // March = 3
        const date = today.getDate();

        // Holi Range: March 10 to March 20
        if(month === 3 && date >= 10 && date <= 20) {
            document.body.classList.add('holi-theme');
            document.getElementById('mainTitle').innerHTML = "Holi Mubarak! 🎨";
        }
        // Diwali Range (Example): Oct 25 to Nov 5
        if((month === 10 && date >= 25) || (month === 11 && date <= 5)) {
            document.body.classList.add('diwali-theme');
            document.getElementById('mainTitle').innerHTML = "Happy Diwali! 🪔";
        }
        // Auto Dark Mode
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.body.classList.add('dark-mode');
        }
    }

    function render(data) {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        data.forEach(text => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div class="content">${text}</div>`;
            feed.appendChild(div);
        });
    }

    function search() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        render(allShayari.filter(s => s.toLowerCase().includes(q)));
    }

    window.onload = () => {
        checkEvents();
        document.getElementById('ownerEmail').innerText = siteConfig.email;
        document.getElementById('socialLinks').innerHTML = `
            <a href="${siteConfig.insta}" style="color:var(--primary)"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/${siteConfig.wa}" style="color:var(--primary)"><i class="fab fa-whatsapp"></i></a>
        `;
        render(allShayari);
    };
</script>
</body>
</html>
