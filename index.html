<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shayari Hub | @shayari-world</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #334155; --primary: #6366f1; --font-size: 1.2rem; }
        .dark-mode { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --primary: #818cf8; }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.35s; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        header { text-align: center; padding: 40px 15px; background: var(--card); border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .brand-name { font-size: 2.2rem; font-weight: 800; color: var(--primary); }
        .username-tag { font-size: 0.85rem; background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; }
        
        .category-container { display: flex; justify-content: center; gap: 10px; margin: 25px 0; overflow-x: auto; padding: 10px; }
        .cat-box { padding: 12px 20px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 0.9rem; border: none; min-width: 100px; }
        .cat-love { background: linear-gradient(45deg, #ff4e50, #f9d423); }
        .cat-sad { background: linear-gradient(45deg, #2193b0, #6dd5ed); }
        .cat-romantic { background: linear-gradient(45deg, #ee0979, #ff6a00); }
        .cat-all { background: #64748b; }

        #searchInput { width: 90%; max-width: 450px; display: block; margin: 0 auto 20px auto; padding: 12px 20px; border-radius: 30px; border: 1px solid #ddd; outline: none; }
        
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; margin-bottom: 20px; border-left: 8px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
        .content { font-size: var(--font-size); line-height: 1.6; margin-bottom: 20px; font-weight: 500; }
        
        .card-footer { display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 15px; }
        .btn { padding: 8px 16px; border-radius: 12px; font-size: 0.85rem; border: none; cursor: pointer; font-weight: bold; color: white; background: var(--primary); display: flex; align-items: center; gap: 5px; text-decoration: none; }
        
        .sidebar-toggle { position: fixed; right: 20px; top: 20px; z-index: 2100; background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .sidebar { position: fixed; right: -320px; top: 0; width: 300px; height: 100%; background: var(--card); z-index: 2000; padding: 30px; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
        .sidebar.active { right: 0; }

        footer { text-align: center; padding: 40px 20px; background: var(--card); margin-top: 40px; }
        .social-icons { display: flex; justify-content: center; gap: 20px; font-size: 1.5rem; margin-bottom: 15px; }
        .social-icons a { color: var(--primary); }
    </style>
</head>
<body id="mainBody">

    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-magic"></i></button>

    <div class="sidebar" id="sidebar">
        <h2 style="margin-bottom:25px;">Settings ✨</h2>
        <button class="btn" style="width:100%; margin-bottom:10px;" onclick="setTheme('light')">Light Mode</button>
        <button class="btn" style="width:100%; background:#0f172a;" onclick="setTheme('dark')">Dark Mode</button>
    </div>

    <header>
        <div class="brand-name">The Shayari Hub</div>
        <div class="username-tag">@shayari-world</div>
    </header>

    <div class="category-container">
        <button class="cat-box cat-all" onclick="filterCat('')">All</button>
        <button class="cat-box cat-love" onclick="filterCat('#love')">Love ❤️</button>
        <button class="cat-box cat-sad" onclick="filterCat('#sad')">Sad 💔</button>
        <button class="cat-box cat-romantic" onclick="filterCat('#romantic')">Romantic 🌹</button>
    </div>

    <input type="text" id="searchInput" placeholder="Search shayari..." oninput="search()">

    <div class="container" id="feed"></div>

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        function setTheme(m) {
            if(m === 'dark') document.body.classList.add('dark-mode');
            else document.body.classList.remove('dark-mode');
        }

        function render(data) {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            data.forEach((text, index) => {
                const div = document.createElement('div');
                div.className = 'card';
                div.id = `card-${index}`;
                div.innerHTML = `
                    <div class="content">${text}</div>
                    <div class="card-footer">
                        <button class="btn" style="background:#6366f1" onclick="downloadImg('card-${index}')"><i class="fas fa-camera"></i> Photo</button>
                        <button class="btn" style="background:#64748b" onclick="copyText(this, \`${text.replace(/`/g, '\\`')}\`)">Copy</button>
                        <a href="https://api.whatsapp.com/send?text=${encodeURIComponent(text)}" target="_blank" class="btn" style="background:#25d366;"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                    </div>
                `;
                feed.appendChild(div);
            });
        }

        function copyText(btn, text) {
            navigator.clipboard.writeText(text);
            btn.innerText = "Copied!";
            setTimeout(() => { btn.innerText = "Copy"; }, 2000);
        }

        function downloadImg(id) {
            const card = document.getElementById(id);
            const footer = card.querySelector('.card-footer');
            footer.style.visibility = 'hidden';
            html2canvas(card, { backgroundColor: '#ffffff', scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'ShayariHub.png';
                link.href = canvas.toDataURL();
                link.click();
                footer.style.visibility = 'visible';
            });
        }

        function filterCat(cat) {
            document.getElementById('searchInput').value = cat;
            search();
        }

        function search() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allShayari.filter(s => s.toLowerCase().includes(q));
            render(filtered);
        }

        window.onload = () => { render(allShayari); };
    </script>
</body>
</html>
