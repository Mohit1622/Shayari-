<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohit Shayari World ✨</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #334155; --primary: #6366f1; }
        .dark-mode { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --primary: #818cf8; }
        .holi-theme { --bg: #fff1f2; --card: #ffffff; --primary: #e11d48; background-image: radial-gradient(#fda4af 1px, transparent 1px); background-size: 20px 20px; }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.3s; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; padding: 10px; min-height: 100vh; }
        .font-elegant { font-family: 'Georgia', serif !important; }
        .font-stylish { font-family: 'cursive', sans-serif !important; }
        .sidebar { position: fixed; right: -280px; top: 0; width: 260px; height: 100%; background: var(--card); z-index: 2000; padding: 25px; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
        .sidebar.active { right: 0; }
        .sidebar-btn { position: fixed; right: 20px; top: 20px; z-index: 2100; background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
        header { text-align: center; padding: 40px 15px; background: var(--card); border-radius: 0 0 30px 30px; margin-bottom: 20px; }
        .container { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border-left: 6px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .btn-opt { padding: 8px; border: 1px solid var(--primary); border-radius: 8px; background: none; color: var(--text); cursor: pointer; width: 100%; margin-top: 5px; font-size: 0.75rem; }
        footer { text-align: center; padding: 40px; margin-top: 20px; background: var(--card); border-radius: 20px; }
        .social-icons { margin: 15px 0; font-size: 1.5rem; display: flex; justify-content: center; gap: 20px; }
    </style>
</head>
<body id="mainBody">

<button class="sidebar-btn" onclick="toggleSidebar()"><i class="fas fa-cog"></i></button>

<div class="sidebar" id="sidebar">
    <h3>Dashboard 🛠️</h3>
    <div style="margin-top:20px;">
        <label style="font-size:0.8rem; font-weight:bold;">THEME</label>
        <button class="btn-opt" onclick="setTheme('dark')">Dark Mode</button>
        <button class="btn-opt" onclick="setTheme('light')">Light Mode</button>
        <button class="btn-opt" onclick="setTheme('holi')">Holi Special 🎨</button>
    </div>
    <div style="margin-top:20px;">
        <label style="font-size:0.8rem; font-weight:bold;">FONT STYLE</label>
        <button class="btn-opt" onclick="setFont('default')">Normal</button>
        <button class="btn-opt" onclick="setFont('font-elegant')">Elegant</button>
        <button class="btn-opt" onclick="setFont('font-stylish')">Stylish</button>
    </div>
    <button class="btn-opt" onclick="toggleSidebar()" style="background:#ff4444; color:white; border:none; margin-top:30px;">Close</button>
</div>

<header>
    <h1>Mohit Shayari World ✨</h1>
    <input type="text" id="searchInput" onkeyup="search()" style="width:90%; padding:10px; margin-top:15px; border-radius:20px; border:1px solid #ddd;" placeholder="Search...">
</header>

<div class="container" id="feed"></div>

<footer>
    <div class="social-icons" id="socialIcons"></div>
    <p><strong>© 2026 Mohit Kumar</strong></p>
    <p id="footerEmail" style="font-size:0.8rem; color:var(--primary); margin-top:5px;"></p>
</footer>

<script src="config.js"></script>
<script src="data.js"></script>

<script>
    function applyAll() {
        // Apply Config
        document.getElementById('footerEmail').innerText = siteConfig.email;
        document.getElementById('socialIcons').innerHTML = `
            <a href="${siteConfig.instagram}" style="color:var(--primary)"><i class="fab fa-instagram"></i></a>
            <a href="${siteConfig.facebook}" style="color:var(--primary)"><i class="fab fa-facebook"></i></a>
            <a href="https://wa.me/${siteConfig.whatsapp}" style="color:var(--primary)"><i class="fab fa-whatsapp"></i></a>
        `;

        // Apply Saved Settings
        const theme = localStorage.getItem('theme') || siteConfig.defaultTheme || 'light';
        const font = localStorage.getItem('font') || 'default';
        setTheme(theme);
        setFont(font);

        // Auto Event Check
        if(siteConfig.autoEvents) {
            const d = new Date();
            if(d.getMonth() === 2 && d.getDate() >= 10 && d.getDate() <= 20) setTheme('holi');
        }
    }

    function setTheme(m) {
        localStorage.setItem('theme', m);
        document.body.classList.remove('dark-mode', 'holi-theme');
        if(m === 'dark') document.body.classList.add('dark-mode');
        if(m === 'holi') document.body.classList.add('holi-theme');
    }

    function setFont(s) {
        localStorage.setItem('font', s);
        const b = document.getElementById('mainBody');
        b.classList.remove('font-elegant', 'font-stylish');
        if(s !== 'default') b.classList.add(s);
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    function render(data) {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        data.forEach(text => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div class="content">${text}</div>`;
            feed.appendChild(div);
        });
    }

    function search() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        render(allShayari.filter(s => s.toLowerCase().includes(q)));
    }

    window.onload = () => { applyAll(); render(allShayari); };
</script>
</body>
</html>
