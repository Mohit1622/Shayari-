<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shayari Hub | Mohit Kumar</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #e91e63; --bg: #ffffff; --text: #333; --light-bg: #f9f9f9; --border: #eee; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Serif Devanagari', serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }

        /* Header Style */
        header { border-bottom: 1px solid var(--border); padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: white; z-index: 1000; }
        .logo { font-size: 24px; font-weight: bold; color: var(--text); text-decoration: none; }
        .nav-btns { display: flex; gap: 10px; }
        .btn-donate { background: var(--primary); color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-size: 14px; font-weight: bold; }

        /* Front Page Hero */
        .hero { text-align: center; padding: 40px 20px; background: var(--light-bg); }
        .hero img { width: 100%; max-width: 400px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .hero h1 { font-size: 28px; color: #000; margin-bottom: 10px; }

        /* Search & Tags */
        .search-container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .search-box { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 5px; outline: none; font-size: 16px; }

        /* Shayari Card */
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .shayari-card { border-bottom: 1px solid var(--border); padding: 30px 0; text-align: center; margin-bottom: 20px; }
        .shayari-text { font-size: 22px; margin-bottom: 20px; white-space: pre-wrap; color: #222; }
        .poet-name { color: #888; font-size: 14px; margin-bottom: 15px; display: block; }

        /* Professional Tags */
        .tag-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tag { font-size: 13px; color: var(--primary); background: #fff1f5; padding: 4px 12px; border-radius: 15px; cursor: pointer; border: 1px solid #ffe0e9; }
        .tag i { margin-right: 5px; }

        /* Rekhta-Style Icon Buttons */
        .card-actions { display: flex; justify-content: center; gap: 25px; margin-top: 20px; }
        .action-btn { background: none; border: none; cursor: pointer; color: #777; font-size: 20px; transition: 0.3s; }
        .action-btn:hover { color: var(--primary); }
        .action-btn span { display: block; font-size: 10px; margin-top: 5px; text-transform: uppercase; }

        /* Donation Modal Overlay */
        #donateModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 90%; max-width: 400px; text-align: center; }
        .modal-content h2 { margin-bottom: 20px; color: var(--primary); }
        .amount-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .amt-btn { padding: 10px; border: 1px solid var(--border); border-radius: 5px; cursor: pointer; }
        .amt-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Footer Style */
        footer { background: #333; color: white; padding: 40px 20px; text-align: left; }
        .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .footer-section h4 { color: #aaa; margin-bottom: 15px; font-size: 14px; }
        .footer-section ul { list-style: none; }
        .footer-section ul li { margin-bottom: 8px; font-size: 14px; color: #ccc; }
        .social-links { text-align: center; border-top: 1px solid #444; padding-top: 20px; }
        .social-links i { font-size: 20px; margin: 0 10px; color: #888; }
    </style>
</head>
<body>

    <header>
        <div class="logo">The Shayari Hub</div>
        <div class="nav-btns">
            <a href="javascript:void(0)" class="btn-donate" onclick="openDonate()">Donate</a>
        </div>
    </header>

    <div class="hero">
        <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=400&q=80" alt="Romantic Shayari">
        <h1>रोमांटिक पर शेर</h1>
        <p style="color:#666; max-width: 500px; margin: 0 auto;">प्यार और एहसास की दुनिया में आपका स्वागत है।</p>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="तलाश कीजिए (जैसे: इश्क़, जुदाई)..." oninput="search()">
    </div>

    <div class="container" id="feed">
        </div>

    <div id="donateModal">
        <div class="modal-content">
            <h2>Help us Grow</h2>
            <div class="amount-grid">
                <div class="amt-btn">₹100</div>
                <div class="amt-btn active">₹250</div>
                <div class="amt-btn">₹500</div>
                <div class="amt-btn">₹1000</div>
            </div>
            <button class="btn-donate" style="width: 100%; border: none; cursor: pointer;">Process Payment</button>
            <p style="margin-top: 15px; font-size: 12px; cursor: pointer;" onclick="closeDonate()">Cancel</p>
        </div>
    </div>

    <footer>
        <div class="footer-grid">
            <div class="footer-section">
                <h4>क्विक लिंक्स</h4>
                <ul>
                    <li>सहयोग</li>
                    <li>उर्दू रिसोर्स</li>
                    <li>संपर्क कीजिए</li>
                </ul>
            </div>
            <div class="footer-section">
                <h4>जानकारी</h4>
                <ul>
                    <li>साइट : परिचय</li>
                    <li>करियर</li>
                    <li>FAQ</li>
                </ul>
            </div>
        </div>
        <div class="social-links">
            <i class="fab fa-facebook"></i>
            <i class="fab fa-instagram"></i>
            <i class="fab fa-youtube"></i>
            <i class="fab fa-whatsapp"></i>
            <p style="margin-top: 20px; font-size: 12px;">© 2026 The Shayari Hub. All rights reserved.</p>
        </div>
    </footer>

    <script src="data.js"></script>
    <script>
        function render(data) {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            
            data.forEach((text, index) => {
                // Tags nikalne ke liye (agar # se tag hai)
                const mainText = text.split('#')[0];
                const tags = text.includes('#') ? text.split('#').slice(1) : [];

                const card = document.createElement('div');
                card.className = 'shayari-card';
                card.innerHTML = `
                    <div class="shayari-text">${mainText}</div>
                    <div class="poet-name">मोहित कुमार</div>
                    
                    <div class="tag-container">
                        ${tags.map(t => `<span class="tag"><i class="fas fa-tag"></i> ${t}</span>`).join('')}
                    </div>

                    <div class="card-actions">
                        <button class="action-btn" onclick="like(this)"><i class="far fa-heart"></i><span>Like</span></button>
                        <button class="action-btn" onclick="copyText('${mainText.replace(/\n/g, ' ')}')"><i class="far fa-copy"></i><span>Copy</span></button>
                        <button class="action-btn"><i class="far fa-comment-dots"></i><span>सुझाव</span></button>
                        <button class="action-btn" onclick="shareWa('${mainText.replace(/\n/g, ' ')}')"><i class="fas fa-share-alt"></i><span>Share</span></button>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        function copyText(val) {
            navigator.clipboard.writeText(val);
            alert("शायरी कॉपी हो गई! ✅");
        }

        function shareWa(val) {
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(val)}`, '_blank');
        }

        function like(btn) {
            const icon = btn.querySelector('i');
            icon.classList.toggle('far');
            icon.classList.toggle('fas');
            icon.style.color = icon.classList.contains('fas') ? '#e91e63' : '#777';
        }

        function search() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allShayari.filter(s => s.toLowerCase().includes(q));
            render(filtered);
        }

        function openDonate() { document.getElementById('donateModal').style.display = 'flex'; }
        function closeDonate() { document.getElementById('donateModal').style.display = 'none'; }

        window.onload = () => { if(typeof allShayari !== 'undefined') render(allShayari); };
    </script>
</body>
</html>
