<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohit Shayari World ✨</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #334155; --primary: #6366f1; }
        .dark-mode { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --primary: #818cf8; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.3s; }
        body { background-color: var(--bg); font-family: sans-serif; padding: 10px; color: var(--text); }
        
        header { text-align: center; padding: 30px 15px; background: var(--card); margin-bottom: 20px; border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .controls { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
        .icon-btn { cursor: pointer; font-size: 1.2rem; color: var(--primary); background: none; border: none; }

        #searchInput { padding: 12px; width: 90%; max-width: 400px; border-radius: 25px; border: 1px solid #ddd; outline: none; margin-top: 15px; background: var(--card); color: var(--text); }
        
        .container { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; border-left: 6px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.03); position: relative; }
        .count-badge { font-size: 0.8rem; color: var(--primary); margin-bottom: 10px; display: block; font-weight: bold; }
        
        .footer-btns { display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid #eee; padding-top: 10px; margin-top: 15px; }
        .btn { padding: 8px 15px; border-radius: 10px; font-size: 0.8rem; cursor: pointer; border: none; font-weight: bold; }
        .copy-btn { background: #f1f5f9; color: #475569; }
        .wa-btn { background: #25d366; color: white; text-decoration: none; }
        
        .suggest-box { background: var(--card); padding: 20px; border-radius: 20px; margin-top: 20px; text-align: center; }
        .suggest-input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; margin: 10px 0; outline: none; }

        footer { margin-top: 40px; text-align: center; padding: 25px; background: var(--card); border-radius: 20px; }
        .social-icons { margin: 15px 0; font-size: 1.5rem; display: flex; justify-content: center; gap: 20px; }
        .social-icons a { color: #64748b; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 50px; display: none; z-index: 1000; }
    </style>
</head>
<body>

<header>
    <h1>Mohit Shayari World ✨</h1>
    <div class="controls">
        <button class="icon-btn" onclick="toggleDark()" title="Dark Mode"><i class="fas fa-moon" id="darkIcon"></i></button>
        <button class="icon-btn" onclick="changeFontSize(1)" title="Increase Font"><i class="fas fa-plus"></i></button>
        <button class="icon-btn" onclick="changeFontSize(-1)" title="Decrease Font"><i class="fas fa-minus"></i></button>
        <span id="totalCount" style="font-weight:bold; color:var(--primary); margin-left:10px;"></span>
    </div>
    <input type="text" id="searchInput" onkeyup="search()" placeholder="Yahan search karein...">
</header>

<div class="container" id="feed"></div>

<div class="container suggest-box">
    <h3>Apni Shayari Sugest Karein ✍️</h3>
    <textarea class="suggest-input" id="suggestion" placeholder="Yahan shayari likhein..."></textarea>
    <button class="btn wa-btn" onclick="submitSuggestion()">WhatsApp par bhejein</button>
</div>

<footer>
    <div class="social-icons">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-whatsapp"></i></a>
    </div>
    <p><strong>© 2026 Mohit Kumar</strong></p>
    <a href="mailto:mchauhan1622@gmail.com" style="color:var(--primary); text-decoration:none; font-size: 0.8rem; display: block; margin-top: 10px;">mchauhan1622@gmail.com 📧</a>
</footer>

<div id="toast" class="toast">Copy Ho Gaya! ✅</div>

<script src="data.js"></script>

<script>
    let currentFontSize = 1.1;

    function render(data) {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        document.getElementById('totalCount').innerText = `Total: ${allShayari.length}`;
        
        data.forEach((text, index) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.style.fontSize = currentFontSize + 'rem';
            div.innerHTML = `
                <span class="count-badge">#${data.length - index}</span>
                <div class="content">${text}</div>
                <div class="footer-btns">
                    <button class="btn copy-btn" onclick="copyText('${text.replace(/'/g, "\\'")}')">Copy</button>
                    <a class="btn wa-btn" href="https://api.whatsapp.com/send?text=${encodeURIComponent(text)}" target="_blank">WhatsApp</a>
                </div>`;
            feed.appendChild(div);
        });
    }

    function search() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        render(allShayari.filter(s => s.toLowerCase().includes(q)));
    }

    function toggleDark() {
        document.body.classList.toggle('dark-mode');
        const icon = document.getElementById('darkIcon');
        icon.classList.toggle('fa-moon');
        icon.classList.toggle('fa-sun');
    }

    function changeFontSize(val) {
        currentFontSize += val * 0.1;
        render(allShayari);
    }

    function submitSuggestion() {
        const text = document.getElementById('suggestion').value;
        if(text) {
            window.open(`https://api.whatsapp.com/send?phone=917018645382&text=Suggestion: ${encodeURIComponent(text)}`);
        }
    }

    function copyText(t) {
        navigator.clipboard.writeText(t);
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }

    render(allShayari);
</script>
</body>
</html>
