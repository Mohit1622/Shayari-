<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohit Shayari World - Best Hindi Shayari</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #f8fafc; font-family: 'Arial', sans-serif; color: #334155; padding: 10px; }
        header { text-align: center; padding: 50px 20px; background: white; margin-bottom: 30px; border-radius: 0 0 40px 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        h1 { font-size: 2.2rem; background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .container { max-width: 550px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .card { background: #ffffff; padding: 30px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; border-left: 6px solid #6366f1; }
        .content { font-size: 1.3rem; line-height: 1.8; margin-bottom: 20px; color: #1e293b; font-weight: 500; }
        .footer-btns { display: flex; justify-content: flex-end; gap: 12px; border-top: 1px solid #f1f5f9; padding-top: 15px; }
        .btn { padding: 10px 20px; border-radius: 12px; font-size: 0.9rem; font-weight: 600; cursor: pointer; border: none; transition: 0.3s; text-decoration: none; }
        .copy-btn { background: #f1f5f9; color: #475569; }
        .share-btn { background: #25d366; color: white; }
        
        /* Business Footer */
        .site-footer { margin-top: 50px; background: white; padding: 40px 20px; text-align: center; border-radius: 40px 40px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.03); }
        .site-footer p { color: #64748b; margin-bottom: 15px; }
        .contact-btn { display: inline-block; background: #6366f1; color: white; padding: 12px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 10px; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 25px; border-radius: 50px; display: none; z-index: 1000; }
    </style>
</head>
<body>

<header>
    <h1>Mohit Shayari World ✨</h1>
    <p style="color: #64748b;">Har Dil Ki Dhadkan, Har Jazbaat Ki Zubaan</p>
</header>

<div class="container" id="feed"></div>

<footer class="site-footer">
    <p><strong>© 2026 Mohit Kumar</strong> | All Rights Reserved</p>
    <p>Contact for Sponsorship & Business:</p>
    <a href="mailto:your-mchauhan1622@gmail.com" class="contact-btn">Business Enquiry 📧</a>
</footer>

<div id="toast" class="toast">Shayari Copy Ho Gayi! ✅</div>

<script>
    const allShayari = [
        "Mohabbat mein jhukna koi buri baat nahi, suraj bhi dhalta hai chand ke liye.",
        "Waqt ne sikhaya hai ki har koi apna nahi hota.",
        "Dost wahi jo bheed mein bhi aapki khamoshi padh le.",
        "Dil se roye magar honto se muskura baithe, hum yuhi kisi se wafa nibha baithe.",
        "Zindagi mein dost milte hain, par sacche dost kismat se milte hain.",
        "Tumhara naam hi kafi hai mere chehre par muskurahat lane ke liye.",
        "Hazaaron khwaishein aisi ki har khwaish pe dam nikle.",
        "Kaun kehta hai nafrat mein dard hai, kabhi mohabbat karke dekho ruh tak kaanp jayegi.",
        "Ishq ne ghalib nikamma kar diya, warna hum bhi aadmi the kaam ke.",
        "Dil bhar gaya hai logon se, ab akelapan hi accha lagta hai.",
        "Zindagi badi honi chahiye, lambi nahi.",
        "Abhi suraj nahi duba zara si shaam hone do, main khud hi laut jaunga mujhe nakam hone do."
    ];

    const feed = document.getElementById('feed');
    allShayari.forEach(text => {
        const card = document.createElement('div');
        card.className = 'card';
        const waUrl = "https://api.whatsapp.com/send?text=" + encodeURIComponent(text);
        card.innerHTML = `
            <div class="content">${text}</div>
            <div class="footer-btns">
                <button class="btn copy-btn" onclick="copyText('${text.replace(/'/g, "\\'")}')">Copy 📋</button>
                <a class="btn share-btn" href="${waUrl}" target="_blank">WhatsApp 📲</a>
            </div>
        `;
        feed.appendChild(card);
    });

    function copyText(text) {
        navigator.clipboard.writeText(text);
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }
</script>

</body>
</html>
