<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shayari Hub | Admin & Pagination</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e91e63; --bg: #ffffff; --text: #333; --sidebar: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Serif Devanagari', serif; }
        body { background: var(--bg); color: var(--text); }

        /* Header & Sidebar */
        header { border-bottom: 1px solid #eee; padding: 15px 20px; display: flex; align-items: center; background: white; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: bold; flex: 1; text-align: center; }
        .sidebar { position: fixed; left: -100%; top: 0; width: 280px; height: 100%; background: var(--sidebar); z-index: 2000; transition: 0.4s; padding: 25px; color: white; }
        .sidebar.active { left: 0; }
        .sidebar ul li { padding: 15px 0; border-bottom: 1px solid #333; cursor: pointer; list-style: none; display: flex; align-items: center; gap: 10px; }

        /* Creator Profile Section (Hidden by Default) */
        .admin-panel { display: none; background: #f9f9f9; border-radius: 10px; padding: 20px; margin-top: 20px; border: 1px solid #ddd; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; }

        /* Pagination Styling */
        .pagination { display: flex; justify-content: center; gap: 10px; margin: 30px 0; }
        .page-btn { padding: 8px 15px; border: 1px solid var(--primary); background: white; color: var(--primary); cursor: pointer; border-radius: 5px; }
        .page-btn.active { background: var(--primary); color: white; }

        /* Shayari Cards */
        .container { max-width: 700px; margin: 0 auto; padding: 20px; }
        .card { border-bottom: 1px solid #eee; padding: 35px 10px; text-align: center; }
        .s-text { font-size: 22px; margin-bottom: 15px; }
        .actions { display: flex; justify-content: center; gap: 25px; color: #777; font-size: 13px; }
        .act-btn { cursor: pointer; display: flex; flex-direction: column; align-items: center; }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; justify-content: center; align-items: center; padding: 20px; }
        .m-content { background: white; border-radius: 12px; width: 100%; max-width: 400px; padding: 25px; }
        footer { background: #1a1a1a; color: #999; padding: 40px 20px; text-align: center; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <h3>The Shayari Hub</h3>
        <ul>
            <li onclick="location.reload()"><i class="fas fa-home"></i> Home</li>
            <li onclick="openModal('loginModal')"><i class="fas fa-user-circle"></i> My Profile (Admin)</li>
            <li onclick="openModal('privacyModal')"><i class="fas fa-shield-alt"></i> Privacy Policy</li>
            <li onclick="openModal('contactModal')"><i class="fas fa-envelope"></i> Contact Us</li>
        </ul>
    </div>

    <header>
        <i class="fas fa-bars" onclick="toggleSidebar()" style="cursor:pointer"></i>
        <div class="logo">The Shayari Hub</div>
        <i class="fas fa-user-lock" onclick="openModal('loginModal')" style="cursor:pointer"></i>
    </header>

    <div class="container">
        <div id="adminArea" class="admin-panel">
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
                <img id="adminPic" src="" class="profile-img">
                <div>
                    <h3 id="adminName">Mohit Kumar</h3>
                    <p style="font-size:12px; color:#666;">Creator & Admin</p>
                </div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; font-size:14px;">
                <div style="background:white; padding:10px; border-radius:5px;">Total Shayari: <b id="totalCount">0</b></div>
                <div style="background:white; padding:10px; border-radius:5px;">Role: <b>Owner</b></div>
            </div>
            <button onclick="window.open('https://sheets.google.com')" style="width:100%; margin-top:15px; padding:8px; background:#2ecc71; color:white; border:none; border-radius:5px;">View Suggestions (DB)</button>
        </div>

        <div id="feed"></div>
        <div class="pagination" id="pagination"></div>
    </div>

    <div class="modal" id="loginModal">
        <div class="m-content">
            <h3>Admin Login</h3>
            <p style="font-size:12px; margin-bottom:15px; color:#666;">Sirf Creator ke liye.</p>
            <input type="password" id="passCode" placeholder="Enter Password" style="width:100%; padding:10px; margin-bottom:15px;">
            <button onclick="checkLogin()" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:5px;">Unlock Profile</button>
            <p onclick="closeModal('loginModal')" style="text-align:center; margin-top:10px; cursor:pointer; font-size:12px;">Close</p>
        </div>
    </div>

    <footer>
        <p>© 2026 The Shayari Hub</p>
        <div id="footerSocial" style="margin-top:15px;">
            <i class="fab fa-facebook" onclick="window.open(SiteConfig.facebook)" style="margin:0 10px; cursor:pointer;"></i>
            <i class="fab fa-instagram" onclick="window.open(SiteConfig.instagram)" style="margin:0 10px; cursor:pointer;"></i>
        </div>
    </footer>

    <script src="config.js"></script>
    <script src="data.js"></script>
    <script>
        let currentPage = 1;
        const itemsPerPage = 20;

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // Admin Login Logic
        function checkLogin() {
            const pass = document.getElementById('passCode').value;
            if(pass === SiteConfig.adminPass) {
                document.getElementById('adminArea').style.display = 'block';
                document.getElementById('adminPic').src = SiteConfig.adminPhoto;
                document.getElementById('totalCount').innerText = allShayari.length;
                closeModal('loginModal');
                alert("Welcome Back, Mohit!");
            } else {
                alert("Galat Password!");
            }
        }

        // Pagination & Render
        function render(page) {
            const feed = document.getElementById('feed');
            const start = (page - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = allShayari.slice(start, end);

            feed.innerHTML = '';
            pageData.forEach((text, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="s-text">${text.split('#')[0]}</div>
                    <div class="actions">
                        <div class="act-btn" onclick="this.style.color='red'"><i class="fas fa-heart"></i><span>Like</span></div>
                        <div class="act-btn" onclick="navigator.clipboard.writeText('${text}')"><i class="fas fa-copy"></i><span>Copy</span></div>
                        <div class="act-btn" onclick="window.open('https://wa.me/?text=${encodeURIComponent(text)}')"><i class="fab fa-whatsapp"></i><span>Share</span></div>
                    </div>
                `;
                feed.appendChild(card);
            });
            createPaginationLinks();
        }

        function createPaginationLinks() {
            const totalPages = Math.ceil(allShayari.length / itemsPerPage);
            const pagBox = document.getElementById('pagination');
            pagBox.innerHTML = '';
            for(let i=1; i<=totalPages; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                btn.onclick = () => { currentPage = i; render(i); window.scrollTo(0,0); };
                pagBox.appendChild(btn);
            }
        }

        window.onload = () => { if(typeof allShayari !== 'undefined') render(1); };
    </script>
</body>
</html>
