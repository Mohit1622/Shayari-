<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shayari Hub | @shayari-world</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --primary: #818cf8; --font-size: 1.2rem; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding-bottom: 50px; }
        header { text-align: center; padding: 40px 15px; background: var(--card); border-radius: 0 0 30px 30px; margin-bottom: 20px; }
        .brand-name { font-size: 2.2rem; font-weight: 800; color: var(--primary); }
        .username-tag { font-size: 0.85rem; background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; }
        .category-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding: 10px; }
        .cat-box { padding: 10px 18px; border-radius: 12px; color: white; cursor: pointer; border: none; font-weight: bold; }
        .cat-love { background: linear-gradient(45deg, #ff4e50, #f9d423); }
        .cat-sad { background: linear-gradient(45deg, #2193b0, #6dd5ed); }
        .cat-all { background: #64748b; }
        #searchInput { width: 90%; max-width: 450px; display: block; margin: 0 auto 20px; padding: 12px 20px; border-radius: 30px; border: none; outline: none; }
        .container { max-width: 600px; margin: 0 auto; padding: 0 15px; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; margin-bottom: 20px; border-left: 6px solid var(--primary); }
        .content { font-size: var(--font-size); line-height: 1.6; margin-bottom: 15px; }
        .card-footer { display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid #334155; padding-top: 15px; }
        .btn { padding: 8px 15px; border-radius: 10px; border: none; cursor: pointer; color: white; background: var(--primary); font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <div class="brand-name">The Shayari Hub</div>
        <div class="username-tag">@shayari-world</div>
    </header>

    <div class="category-container">
        <button class="cat-box cat-all" onclick="filterCat('')">All</button>
        <button class="cat-box cat-love" onclick="filterCat('#love')">Love ❤️</button>
        <button class="cat-box cat-sad" onclick="filterCat('#sad')">Sad 💔</button>
    </div>

    <input type="text" id="searchInput" placeholder="Search shayari..." oninput="search()">

    <div class="container" id="feed"></div>

    <script>
        // AB DATA DIRECT YAHIN HAI, FILE KI ZAROORAT NAHI
        const allShayari = [
            "Teri khamoshi mein bhi ek sukoon sa milta hai, ye dil ab bas tere hi khayalon mein khilta hai.",
            "Zindagi ki har raah par tera saath chahiye mujhe bas teri baahon ka mehakta sa hath chahiye.",
            "Mohabbat ka rang kuch aise chadha hai tum par ab har dua mein bas tera hi naam rehta hai lab par.",
            "Tunhe sochna hi ek ibadat si ban gayi hai ab toh bas tumhe chahna hi meri aadat si ban gayi hai.",
            "Beshak tum ja chuke ho, par tumhara naam aaj bhi, mere dil ki dhadkan tez kar deta hai.#sad",
            "Are aapko to izzat karni chahiye thi is khamoshi ki..! Hm to iske phichhe aapki aukat chipaye baithe the..!!#sad",
            "Safar tumhare sath Chhota Raha lekin Jindagi Bhar Ke Liye Sabak ban gaya.#sad#love",
            "Uski Khushi Ke Liye use to Chhod Diya Maine per meri Khushiyan bhi Usi ke sath Chali gai.#sad#love",
            "Rewafa hi nahi berham bhi ho tum Jindagi tabah Karke Kahate Ho ki jao ab khush raho tum.#sad#love",
            "Bahut khush rahte hain wo apne dil ka, dard nahi lana hai, unhe kya pata hai baat gehri hai fir se wahi...."
        ]; //

        function render(data) {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            data.forEach((text, index) => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="content">${text}</div>
                    <div class="card-footer">
                        <button class="btn" onclick="copyText('${text.replace(/'/g, "\\'")}')">Copy</button>
                        <a href="https://api.whatsapp.com/send?text=${encodeURIComponent(text)}" target="_blank" class="btn" style="background:#25d366; text-decoration:none;">WhatsApp</a>
                    </div>
                `;
                feed.appendChild(div);
            });
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            alert("Copied!");
        }

        function filterCat(cat) {
            document.getElementById('searchInput').value = cat;
            search();
        }

        function search() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allShayari.filter(s => s.toLowerCase().includes(q));
            render(filtered);
        }

        // Page load hote hi shayari dikhao
        window.onload = () => { render(allShayari); };
    </script>
</body>
</html>
